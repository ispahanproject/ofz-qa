<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OFZ Q&A</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700&display=swap');

:root {
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --text-2: #475569;
  --text-3: #94a3b8;
  --border: #e2e8f0;
  --ring: #3b82f6;
  --om: #3b82f6;
  --rm: #8b5cf6;
  --aom: #06b6d4;
  --radius: 16px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Login Screen */
#loginScreen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: var(--bg);
}
#appScreen { display: none; }
.login-card {
  background: var(--card); border-radius: 20px; padding: 48px 40px;
  box-shadow: var(--shadow-lg); max-width: 400px; width: 90%; text-align: center;
}
.login-logo {
  width: 56px; height: 56px; border-radius: 14px;
  background: linear-gradient(135deg, var(--om), var(--aom));
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 800; font-size: 16px;
  margin: 0 auto 20px;
}
.login-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.login-card p { font-size: 13px; color: var(--text-3); margin-bottom: 28px; }
.login-input {
  width: 100%; padding: 14px 16px; border: 1.5px solid var(--border);
  border-radius: 12px; font-size: 15px; font-family: inherit;
  outline: none; text-align: center; letter-spacing: 2px;
  transition: all 0.2s;
}
.login-input:focus { border-color: var(--ring); box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
.login-input.error { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.1); }
.login-btn {
  width: 100%; padding: 14px; background: var(--text); color: white;
  border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
  font-family: inherit; cursor: pointer; margin-top: 12px; transition: opacity 0.2s;
}
.login-btn:hover { opacity: 0.85; }
.login-btn:disabled { opacity: 0.5; cursor: default; }
.login-error {
  color: #ef4444; font-size: 13px; margin-top: 12px; min-height: 20px;
}

/* Header */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 20px 0;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.85);
}
.header-inner {
  max-width: 1200px; margin: 0 auto; padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--om), var(--aom));
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 800; font-size: 14px; letter-spacing: -0.5px;
}
.logo h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.logo h1 span { color: var(--text-3); font-weight: 500; font-size: 14px; margin-left: 8px; }
.stat-pills { display: flex; gap: 8px; }
.stat-pill {
  padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 600;
  background: var(--bg); color: var(--text-2);
}

/* Main */
.main { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* Tabs */
.tabs {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px;
}
.tab {
  padding: 16px 12px; text-align: center; cursor: pointer;
  border: 1.5px solid var(--border); border-radius: 14px;
  background: var(--card); transition: all 0.2s ease;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.tab:hover { border-color: var(--text-3); }
.tab-count { font-size: 24px; font-weight: 800; letter-spacing: -1px; color: var(--text); transition: color 0.2s; }
.tab-label { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; transition: color 0.2s; }
.tab.active { border-color: transparent; box-shadow: var(--shadow-md); }
.tab[data-tab="all"].active { background: var(--text); }
.tab[data-tab="om"].active { background: var(--om); }
.tab[data-tab="rm"].active { background: var(--rm); }
.tab[data-tab="aom"].active { background: var(--aom); }
.tab.active .tab-count, .tab.active .tab-label { color: white; }

/* Search */
.search-bar { position: relative; margin-bottom: 16px; }
.search-bar svg {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  width: 18px; height: 18px; color: var(--text-3); pointer-events: none;
}
.search-bar input {
  width: 100%; padding: 14px 16px 14px 46px;
  border: 1.5px solid var(--border); border-radius: 14px;
  font-size: 15px; font-family: inherit; background: var(--card);
  outline: none; transition: all 0.2s; color: var(--text);
  box-shadow: var(--shadow-sm);
}
.search-bar input::placeholder { color: var(--text-3); }
.search-bar input:focus { border-color: var(--ring); box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }

.filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
.filter-chip {
  padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 13px; font-family: inherit; background: var(--card);
  cursor: pointer; outline: none; color: var(--text-2);
  appearance: none; -webkit-appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 12px center;
  padding-right: 32px; transition: all 0.15s;
}
.filter-chip:focus { border-color: var(--ring); }

/* Results bar */
.results-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; padding: 0 4px;
}
.results-count { font-size: 13px; color: var(--text-3); font-weight: 500; }
.sort-group { display: flex; gap: 4px; background: var(--bg); border-radius: 10px; padding: 3px; }
.sort-btn {
  padding: 6px 14px; border: none; border-radius: 8px;
  background: transparent; font-size: 12px; font-weight: 600;
  font-family: inherit; cursor: pointer; color: var(--text-3); transition: all 0.15s;
}
.sort-btn.active { background: var(--card); color: var(--text); box-shadow: var(--shadow-sm); }

/* Cards */
.qa-list { display: flex; flex-direction: column; gap: 8px; }

.qa-card {
  background: var(--card); border-radius: var(--radius); padding: 20px 24px;
  box-shadow: var(--shadow-sm); cursor: pointer; transition: all 0.2s ease;
  border: 1px solid transparent;
  position: relative; overflow: hidden;
}
.qa-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  border-radius: 0 3px 3px 0; transition: opacity 0.2s;
}
.qa-card.source-om::before { background: var(--om); }
.qa-card.source-rm::before { background: var(--rm); }
.qa-card.source-aom::before { background: var(--aom); }
.qa-card:hover { border-color: var(--border); box-shadow: var(--shadow-md); }

.qa-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; align-items: center; }
.badge {
  display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.2px;
}
.badge-om { background: #eff6ff; color: #2563eb; }
.badge-rm { background: #f5f3ff; color: #7c3aed; }
.badge-aom { background: #ecfeff; color: #0891b2; }
.badge-aircraft { background: #fefce8; color: #a16207; }
.badge-category { background: #f0fdf4; color: #16a34a; }
.badge-urgency { background: #f8fafc; color: var(--text-3); }
.badge-urgency-high { background: #fef2f2; color: #dc2626; }
.qa-date { font-size: 11px; color: var(--text-3); font-weight: 500; }
.qa-id { font-size: 11px; color: var(--text-3); font-family: 'SF Mono', 'Fira Code', monospace; }

.qa-title {
  font-size: 15px; font-weight: 600; margin-bottom: 4px;
  color: var(--text); letter-spacing: -0.2px; line-height: 1.5;
}
.qa-preview {
  font-size: 13px; color: var(--text-3); line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

.qa-detail {
  display: none; margin-top: 20px; padding-top: 20px;
  border-top: 1px solid var(--border);
}
.qa-card.expanded .qa-detail { display: block; }
.qa-card.expanded .qa-preview { display: none; }

.detail-block { margin-bottom: 20px; }
.detail-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text-3); margin-bottom: 8px;
}
.detail-content {
  font-size: 14px; line-height: 1.9; white-space: pre-wrap; word-break: break-word;
  padding: 16px 20px; border-radius: 12px; background: #f8fafc;
}
.detail-content.answer { background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%); }
.detail-info { font-size: 12px; color: var(--text-3); margin-top: 6px; }

.highlight { background: #fef08a; padding: 1px 3px; border-radius: 3px; }

/* Pagination */
.pagination { display: flex; justify-content: center; gap: 4px; margin-top: 32px; }
.page-btn {
  width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border); border-radius: 10px;
  background: var(--card); cursor: pointer; font-size: 13px; font-weight: 600;
  font-family: inherit; color: var(--text-2); transition: all 0.15s;
}
.page-btn:hover:not(.active):not(:disabled) { background: var(--bg); border-color: var(--text-3); }
.page-btn.active { background: var(--text); color: white; border-color: var(--text); }
.page-btn:disabled { opacity: 0.3; cursor: default; }
.page-dots { display: flex; align-items: center; padding: 0 4px; color: var(--text-3); font-size: 12px; }

.no-results { text-align: center; padding: 80px 20px; }
.no-results p { color: var(--text-3); }
.no-results p:first-child { font-size: 16px; font-weight: 600; margin-bottom: 4px; color: var(--text-2); }

@media (max-width: 768px) {
  .header-inner { flex-direction: column; gap: 12px; align-items: flex-start; }
  .stat-pills { display: none; }
  .tabs { grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .tab { padding: 12px 8px; }
  .tab-count { font-size: 20px; }
  .main { padding: 16px; }
  .qa-card { padding: 16px; }
  .login-card { padding: 36px 28px; }
}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Q&A</div>
    <h2>OFZ Q&A データベース</h2>
    <p>アクセスにはパスワードが必要です</p>
    <input type="password" class="login-input" id="passwordInput" placeholder="パスワード" autocomplete="off">
    <button class="login-btn" id="loginBtn" onclick="attemptLogin()">ログイン</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- App Screen -->
<div id="appScreen">
  <div class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-mark">Q&A</div>
        <h1>OFZ データベース<span id="stat-total"></span></h1>
      </div>
      <div class="stat-pills">
        <div class="stat-pill" id="stat-om"></div>
        <div class="stat-pill" id="stat-rm"></div>
        <div class="stat-pill" id="stat-aom"></div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="tabs">
      <div class="tab active" data-tab="all" onclick="switchTab('all')">
        <span class="tab-count" id="count-all">-</span>
        <span class="tab-label">All</span>
      </div>
      <div class="tab" data-tab="om" onclick="switchTab('om')">
        <span class="tab-count" id="count-om">-</span>
        <span class="tab-label">OM</span>
      </div>
      <div class="tab" data-tab="rm" onclick="switchTab('rm')">
        <span class="tab-count" id="count-rm">-</span>
        <span class="tab-label">Route Manual</span>
      </div>
      <div class="tab" data-tab="aom" onclick="switchTab('aom')">
        <span class="tab-count" id="count-aom">-</span>
        <span class="tab-label">AOM</span>
      </div>
    </div>

    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="キーワードで検索..." autocomplete="off">
    </div>

    <div class="filters">
      <select class="filter-chip" id="filterAircraft" onchange="doSearch()">
        <option value="">機種</option>
      </select>
      <select class="filter-chip" id="filterCategory" onchange="doSearch()">
        <option value="">カテゴリ</option>
      </select>
    </div>

    <div class="results-bar">
      <div class="results-count" id="resultsCount"></div>
      <div class="sort-group">
        <button class="sort-btn active" data-sort="date-desc" onclick="setSort(this)">新しい順</button>
        <button class="sort-btn" data-sort="date-asc" onclick="setSort(this)">古い順</button>
        <button class="sort-btn" data-sort="relevance" onclick="setSort(this)" id="sortRelevance" style="display:none">関連度</button>
      </div>
    </div>

    <div class="qa-list" id="qaList"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script>
// === Decryption ===
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

async function decryptData(password) {
  const resp = await fetch('data.enc.txt');
  const b64 = await resp.text();
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt = raw.slice(0, 16);
  const iv = raw.slice(16, 28);
  const ciphertext = raw.slice(28);
  const key = await deriveKey(password, salt);
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  return JSON.parse(new TextDecoder().decode(decrypted));
}

// === Login ===
async function attemptLogin() {
  const pw = document.getElementById('passwordInput').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  const input = document.getElementById('passwordInput');
  if (!pw) { errEl.textContent = 'パスワードを入力してください'; input.classList.add('error'); return; }

  btn.disabled = true; btn.textContent = '認証中...'; errEl.textContent = ''; input.classList.remove('error');
  try {
    const data = await decryptData(pw);
    sessionStorage.setItem('ofz_auth', '1');
    initApp(data);
  } catch (e) {
    errEl.textContent = 'パスワードが正しくありません';
    input.classList.add('error');
    btn.disabled = false; btn.textContent = 'ログイン';
  }
}

document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') attemptLogin();
});
document.getElementById('passwordInput').addEventListener('input', () => {
  document.getElementById('passwordInput').classList.remove('error');
  document.getElementById('loginError').textContent = '';
});

function initApp(data) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  allData = data;
  allData.forEach(d => { d.aircraft = normAc(d.aircraft); });
  buildFilters();
  updateHeader();
  doSearch();
}

// === App Logic ===
let allData = [], filtered = [], currentPage = 1, currentSort = 'date-desc', currentTab = 'all', searchTerm = '';
const PER_PAGE = 20;
const TAB_SOURCE = { all: null, om: 'OM質問サイト', rm: 'Route Manual質問サイト', aom: 'AOM質問サイト' };

function srcKey(s) { return s === 'OM質問サイト' ? 'om' : s === 'Route Manual質問サイト' ? 'rm' : 'aom'; }
function normAc(a) { return a ? a.replace(/^B/, '') : ''; }

function buildFilters() {
  const acs = [...new Set(allData.map(d => d.aircraft).filter(Boolean))].sort();
  const cats = [...new Set(allData.map(d => d.category).filter(Boolean))].sort();
  const acSel = document.getElementById('filterAircraft');
  acs.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; acSel.appendChild(o); });
  const catSel = document.getElementById('filterCategory');
  cats.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; catSel.appendChild(o); });
}

function updateHeader() {
  document.getElementById('stat-total').textContent = ` ${allData.length}件`;
  const omN = allData.filter(d => d.source === 'OM質問サイト').length;
  const rmN = allData.filter(d => d.source === 'Route Manual質問サイト').length;
  const aomN = allData.filter(d => d.source === 'AOM質問サイト').length;
  document.getElementById('stat-om').textContent = `OM ${omN}`;
  document.getElementById('stat-rm').textContent = `RM ${rmN}`;
  document.getElementById('stat-aom').textContent = `AOM ${aomN}`;
  document.getElementById('count-all').textContent = allData.length;
  document.getElementById('count-om').textContent = omN;
  document.getElementById('count-rm').textContent = rmN;
  document.getElementById('count-aom').textContent = aomN;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  updateCatFilter();
  doSearch();
}

function updateCatFilter() {
  const sf = TAB_SOURCE[currentTab];
  const rel = sf ? allData.filter(d => d.source === sf) : allData;
  const cats = [...new Set(rel.map(d => d.category).filter(Boolean))].sort();
  const sel = document.getElementById('filterCategory');
  const cur = sel.value;
  sel.innerHTML = '<option value="">カテゴリ</option>';
  cats.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });
  if (cats.includes(cur)) sel.value = cur;
}

function doSearch() {
  searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
  const sf = TAB_SOURCE[currentTab];
  const ac = document.getElementById('filterAircraft').value;
  const cat = document.getElementById('filterCategory').value;

  filtered = allData.filter(d => {
    if (sf && d.source !== sf) return false;
    if (ac && d.aircraft !== ac) return false;
    if (cat && d.category !== cat) return false;
    if (searchTerm) {
      const hay = (d.title + ' ' + d.question + ' ' + d.answer + ' ' + d.section + ' ' + d.category).toLowerCase();
      return searchTerm.split(/\s+/).every(t => hay.includes(t));
    }
    return true;
  });

  if (searchTerm) {
    const terms = searchTerm.split(/\s+/);
    filtered.forEach(d => {
      let s = 0;
      const tl = (d.title||'').toLowerCase(), ql = (d.question||'').toLowerCase(), al = (d.answer||'').toLowerCase();
      terms.forEach(t => { if(tl.includes(t)) s+=10; s+=(ql.split(t).length-1)*2+(al.split(t).length-1); });
      d._score = s;
    });
    document.getElementById('sortRelevance').style.display = '';
  } else {
    document.getElementById('sortRelevance').style.display = 'none';
    if (currentSort === 'relevance') { currentSort = 'date-desc'; document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === currentSort)); }
  }
  sortData(); currentPage = 1; render();
}

function sortData() {
  if (currentSort === 'date-desc') filtered.sort((a,b) => (b.date||'').localeCompare(a.date||''));
  else if (currentSort === 'date-asc') filtered.sort((a,b) => (a.date||'').localeCompare(b.date||''));
  else filtered.sort((a,b) => (b._score||0) - (a._score||0));
}

function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  sortData(); currentPage = 1; render();
}

function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

function hl(text, term) {
  if (!term || !text) return esc(text);
  let r = esc(text);
  term.split(/\s+/).filter(Boolean).forEach(t => {
    r = r.replace(new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')','gi'), '<span class="highlight">$1</span>');
  });
  return r;
}

function urgClass(u) {
  if (!u) return 'badge-urgency';
  return (u.includes('急行') || u.includes('特急')) ? 'badge-urgency-high' : 'badge-urgency';
}

function toggleCard(el) { el.classList.toggle('expanded'); }

function render() {
  const total = filtered.length, totalPages = Math.ceil(total / PER_PAGE);
  const start = (currentPage - 1) * PER_PAGE;
  const page = filtered.slice(start, start + PER_PAGE);
  document.getElementById('resultsCount').textContent = `${total} 件`;

  const list = document.getElementById('qaList');
  if (!page.length) {
    list.innerHTML = '<div class="no-results"><p>該当するQ&Aがありません</p><p>検索条件を変更してください</p></div>';
  } else {
    list.innerHTML = page.map(d => {
      const sk = srcKey(d.source);
      return `<div class="qa-card source-${sk}" onclick="toggleCard(this)">
        <div class="qa-meta">
          ${currentTab === 'all' ? `<span class="badge badge-${sk}">${sk.toUpperCase()}</span>` : ''}
          ${d.aircraft ? `<span class="badge badge-aircraft">${esc(d.aircraft)}</span>` : ''}
          ${d.category ? `<span class="badge badge-category">${esc(d.category)}</span>` : ''}
          <span class="badge ${urgClass(d.urgency)}">${esc(d.urgency||'普通')}</span>
          <span class="qa-date">${esc(d.date)}</span>
          <span class="qa-id">${esc(d.id)}</span>
        </div>
        <div class="qa-title">${hl(d.title||'(タイトルなし)', searchTerm)}</div>
        <div class="qa-preview">${hl((d.question||'').substring(0,200), searchTerm)}</div>
        <div class="qa-detail">
          ${d.section ? `<div class="detail-block"><div class="detail-label">Section</div><div class="detail-content">${hl(d.section, searchTerm)}</div></div>` : ''}
          <div class="detail-block">
            <div class="detail-label">Question</div>
            <div class="detail-content">${hl(d.question, searchTerm)}</div>
            ${d.questioner||d.department ? `<div class="detail-info">${d.questioner?esc(d.questioner):''}${d.questioner&&d.department?' / ':''}${d.department?esc(d.department):''}</div>` : ''}
          </div>
          <div class="detail-block">
            <div class="detail-label">Answer</div>
            <div class="detail-content answer">${hl(d.answer, searchTerm)}</div>
            ${d.answerer ? `<div class="detail-info">${esc(d.answerer)}</div>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  let h = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>&lsaquo;</button>`;
  getRange(currentPage, totalPages).forEach(p => {
    h += p === '...' ? '<span class="page-dots">...</span>' : `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  h += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>&rsaquo;</button>`;
  pag.innerHTML = h;
}

function getRange(c, t) {
  if (t <= 7) return Array.from({length:t},(_,i)=>i+1);
  const p = [1]; if(c>3) p.push('...');
  for (let i=Math.max(2,c-1); i<=Math.min(t-1,c+1); i++) p.push(i);
  if(c<t-2) p.push('...'); p.push(t); return p;
}

function goPage(p) {
  const tp = Math.ceil(filtered.length / PER_PAGE);
  if (p<1||p>tp) return;
  currentPage = p; render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.getElementById('searchInput').addEventListener('input', e => { if (!e.target.value) doSearch(); });
</script>
</body>
</html>
